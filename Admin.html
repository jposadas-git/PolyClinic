<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolyClinic Admin Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
    .modal-backdrop { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

  <!-- Top Navigation -->
  <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 shadow-md">
    <div class="max-w-[95%] mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="bg-teal-500 p-2 rounded-lg text-white">
          <i data-lucide="shield-check" class="w-5 h-5"></i>
        </div>
        <span class="text-lg font-bold text-white tracking-tight">PolyClinic <span class="text-teal-400 font-medium">Admin</span></span>
      </div>
      <div id="loading-indicator" class="flex items-center gap-2 text-teal-400 bg-slate-800 px-3 py-1.5 rounded-full font-medium text-xs border border-slate-700 hidden">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-teal-500"></span>
        </span>
        Processing Data...
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <main class="flex-1 max-w-[95%] mx-auto w-full p-4 md:p-6 lg:p-8 space-y-6">
    
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
        <h2 class="text-lg font-bold text-slate-900">Appointment Requests</h2>
        <button onclick="loadAdminData()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh
        </button>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm whitespace-nowrap">
          <thead class="bg-slate-50 border-b border-slate-100 text-slate-500">
            <tr>
              <th class="px-6 py-4 font-semibold uppercase tracking-wider text-[10px]">Reference ID</th>
              <th class="px-6 py-4 font-semibold uppercase tracking-wider text-[10px]">Patient Info</th>
              <th class="px-6 py-4 font-semibold uppercase tracking-wider text-[10px]">Date Submitted</th>
              <th class="px-6 py-4 font-semibold uppercase tracking-wider text-[10px]">Purpose</th>
              <th class="px-6 py-4 font-semibold uppercase tracking-wider text-[10px]">Requested Schedule</th>
              <th class="px-6 py-4 font-semibold uppercase tracking-wider text-[10px]">Practitioner</th>
              <th class="px-6 py-4 font-semibold uppercase tracking-wider text-[10px]">Status</th>
              <th class="px-6 py-4 font-semibold uppercase tracking-wider text-[10px] text-right">Action</th>
            </tr>
          </thead>
          <tbody id="admin-table-body" class="divide-y divide-slate-100 bg-white">
            <tr>
              <td colspan="8" class="px-6 py-12 text-center text-slate-400">Loading appointments...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Decline Modal -->
  <div id="decline-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-backdrop">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-slide-up">
      <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-rose-50/50">
        <h3 class="font-bold text-rose-900 flex items-center gap-2"><i data-lucide="x-circle" class="w-5 h-5 text-rose-600"></i> Decline Request</h3>
        <button onclick="closeDeclineModal()" class="text-slate-400 hover:text-slate-600 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div class="p-6 space-y-4">
        <p class="text-sm text-slate-600">Please provide a reason for declining <strong id="decline-ref-display"></strong>. The patient will receive this in an email.</p>
        <textarea id="decline-reason" rows="3" required placeholder="e.g., Doctor is unavailable, slot is double booked..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-rose-500 outline-none transition-all resize-none"></textarea>
        
        <div class="pt-2 flex gap-3">
          <button onclick="closeDeclineModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors">Cancel</button>
          <button onclick="submitDecline()" id="btn-submit-decline" class="flex-1 py-3 bg-rose-600 text-white rounded-lg text-sm font-bold hover:bg-rose-700 shadow-md shadow-rose-200 transition-all">Decline & Notify</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    let currentDeclineRef = null;
    const loadingIndicator = document.getElementById('loading-indicator');
    const tableBody = document.getElementById('admin-table-body');

    function loadAdminData() {
      loadingIndicator.classList.remove('hidden');
      tableBody.innerHTML = '<tr><td colspan="8" class="px-6 py-12 text-center text-slate-400">Loading appointments...</td></tr>';
      
      google.script.run
        .withSuccessHandler(res => {
          loadingIndicator.classList.add('hidden');
          if (res.success) renderTable(res.appointments);
          else alert("Failed to load: " + res.error);
        })
        .withFailureHandler(err => {
          loadingIndicator.classList.add('hidden');
          alert("Connection Error.");
        })
        .getAdminData();
    }

    function renderTable(data) {
      if (data.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="8" class="px-6 py-12 text-center text-slate-400">No appointments found.</td></tr>';
        return;
      }
      
      tableBody.innerHTML = '';
      data.forEach(appt => {
        let statusClass = "bg-slate-100 text-slate-600";
        if (appt.status === "Pending") statusClass = "bg-amber-100 text-amber-700";
        if (appt.status === "Booked") statusClass = "bg-emerald-100 text-emerald-700";
        if (appt.status === "Declined") statusClass = "bg-rose-100 text-rose-700";

        // Only show Accept/Decline buttons if status is Pending
        let actionButtons = '-';
        if (appt.status === "Pending") {
          actionButtons = `
            <div class="flex justify-end gap-2">
              <button onclick="acceptRequest('${appt.refId}')" class="p-2 bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white rounded-lg transition-colors tooltip" title="Accept & Notify"><i data-lucide="check" class="w-4 h-4"></i></button>
              <button onclick="openDeclineModal('${appt.refId}')" class="p-2 bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white rounded-lg transition-colors tooltip" title="Decline"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
          `;
        }

        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50 transition-colors";
        tr.innerHTML = `
          <td class="px-6 py-4 font-bold text-slate-700">${appt.refId}</td>
          <td class="px-6 py-4">
            <p class="font-bold text-slate-700">${appt.patientName}</p>
            <p class="text-xs text-slate-500">${appt.patientEmail}</p>
          </td>
          <td class="px-6 py-4 text-slate-500">${appt.dateSubmitted}</td>
          <td class="px-6 py-4 text-slate-500">${appt.patientPurpose}</td>
          <td class="px-6 py-4">
            <p class="font-bold text-slate-800">${appt.aptDate}</p>
            <p class="text-xs text-slate-500">${appt.time}</p>
          </td>
          <td class="px-6 py-4">
            <p class="font-bold text-slate-700">${appt.practitioner}</p>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest">
              ${appt.service} ${appt.location ? ' &bull; ' + appt.location : ''}
            </p>
          </td>
          <td class="px-6 py-4">
            <span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider ${statusClass}">${appt.status}</span>
          </td>
          <td class="px-6 py-4 text-right">${actionButtons}</td>
        `;
        tableBody.appendChild(tr);
      });
      lucide.createIcons();
    }

    function acceptRequest(refId) {
      if (!confirm(`Are you sure you want to ACCEPT request ${refId}? An email will be sent immediately.`)) return;
      
      loadingIndicator.classList.remove('hidden');
      google.script.run
        .withSuccessHandler(res => {
          if (res.success) loadAdminData();
          else { alert("Error: " + res.message); loadingIndicator.classList.add('hidden'); }
        })
        .processAdminAction({ referenceId: refId, action: 'accept', reason: '' });
    }

    function openDeclineModal(refId) {
      currentDeclineRef = refId;
      document.getElementById('decline-ref-display').textContent = refId;
      document.getElementById('decline-reason').value = '';
      document.getElementById('decline-modal').classList.remove('hidden');
    }

    function closeDeclineModal() {
      document.getElementById('decline-modal').classList.add('hidden');
    }

    function submitDecline() {
      const reason = document.getElementById('decline-reason').value.trim();
      if (!reason) { alert("Please provide a reason."); return; }
      
      const btn = document.getElementById('btn-submit-decline');
      btn.disabled = true;
      btn.textContent = 'Processing...';
      loadingIndicator.classList.remove('hidden');

      google.script.run
        .withSuccessHandler(res => {
          btn.disabled = false;
          btn.textContent = 'Decline & Notify';
          closeDeclineModal();
          
          if (res.success) loadAdminData();
          else { alert("Error: " + res.message); loadingIndicator.classList.add('hidden'); }
        })
        .processAdminAction({ referenceId: currentDeclineRef, action: 'decline', reason: reason });
    }

    window.onload = loadAdminData;
  </script>
</body>
</html>
